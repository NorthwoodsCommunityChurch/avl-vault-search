<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="#0a0a0a"/>

    <!-- Vault door body -->
    <g transform="translate(256,256)">
      <!-- Outer thick vault frame -->
      <circle r="170" fill="none" stroke="#ffffff" stroke-width="12"/>
      
      <!-- Door face -->
      <circle r="148" fill="#ffffff"/>

      <!-- Bolt circles around the rim -->
      <g fill="#0a0a0a">
        <circle cx="0" cy="-155" r="8"/>
        <circle cx="0" cy="155" r="8"/>
        <circle cx="-155" cy="0" r="8"/>
        <circle cx="155" cy="0" r="8"/>
        <circle cx="-110" cy="-110" r="7"/>
        <circle cx="110" cy="110" r="7"/>
        <circle cx="-110" cy="110" r="7"/>
        <circle cx="110" cy="-110" r="7"/>
      </g>

      <!-- Vault wheel handle — spokes with connecting ring -->
      <circle r="72" fill="none" stroke="#0a0a0a" stroke-width="5"/>
      <line x1="0" y1="-72" x2="0" y2="72" stroke="#0a0a0a" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="-72" y1="0" x2="72" y2="0" stroke="#0a0a0a" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="-51" y1="-51" x2="51" y2="51" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round"/>
      <line x1="51" y1="-51" x2="-51" y2="51" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round"/>

      <!-- Center hub -->
      <circle r="18" fill="#0a0a0a"/>
      <circle r="10" fill="#ffffff"/>
    </g>

    <!-- Magnifying glass — bold white -->
    <g filter="url(#glow)">
      <line x1="396" y1="396" x2="442" y2="442" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
      <circle cx="358" cy="358" r="52" fill="#0a0a0a"/>
      <circle cx="358" cy="358" r="52" fill="none" stroke="#ffffff" stroke-width="8"/>
      <line x1="328" y1="358" x2="388" y2="358" stroke="#ffffff" stroke-width="3" opacity="0.7" stroke-dasharray="4 6"/>
    </g>
  </g>
  <rect width="512" height="512" rx="112" fill="none" stroke="#222" stroke-width="1"/>
</svg>
