name: VaultSearch

options:
  bundleIdPrefix: com.northwoods
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

targets:
  VaultSearch:
    type: application
    platform: macOS
    sources:
      - path: VaultSearch
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.northwoods.VaultSearch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: VaultSearch/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: false
